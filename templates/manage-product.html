<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - GroceryManager</title>
    <link rel="stylesheet" href="/static/css/custom.css?v=3">
</head>

<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">GroceryManager</a>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/manage-products" class="nav-link active">Products</a>
            <a href="/orders" class="nav-link">New Order</a>
        </div>
    </nav>

    <div class="container">
        <!-- Search Bar -->
<div class="card" style="margin-bottom: 1rem;">
    <div style="display: flex; align-items: center; gap: 1rem;">
        <input type="text" id="searchBar" class="form-control" placeholder="🔍 Search products by name..." 
            oninput="filterProducts()" style="font-size: 1rem;">
        <button class="btn btn-secondary" onclick="document.getElementById('searchBar').value=''; filterProducts()">Clear</button>
    </div>
</div>
        <!-- Inline Add Product Form -->
        <div class="card"
            style="background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(16, 185, 129, 0.1)); border: 1px solid rgba(255,255,255,0.2);">
            <div class="card-header">
                <h2 class="card-title"
                    style="background: linear-gradient(to right, #6366f1, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.5rem;">
                    Add New Product
                </h2>
                <button class="btn btn-secondary btn-sm" onclick="openUOMModal()">+ Add New Unit (UOM)</button>
            </div>

            <form id="productForm">
                <input type="hidden" id="productId">
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 1.5rem; align-items: end;">
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Product
                            Name</label>
                        <input type="text" id="productName" class="form-control" required
                            placeholder="e.g. Basmati Rice">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Unit</label>
                        <select id="uomSelect" class="form-control" required>
                            <!-- Filled by JS -->
                        </select>
                    </div>
                    <div>
                        <label
                            style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Price/Unit</label>
                        <input type="number" step="0.01" id="productPrice" class="form-control" required
                            placeholder="0.00">
                    </div>
                    <button type="submit" class="btn btn-primary" style="height: 42px;">+ Add Product</button>
                </div>
            </form>
        </div>

        <!-- Inventory Table -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Product Inventory</h2>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Unit</th>
                            <th>Price Per Unit</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-table-body">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Product Modal (Only for Editing now) -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Edit Product</h2>
            <form id="editProductForm"> <!-- Changed ID to avoid conflict with inline form -->
                <input type="hidden" id="editProductId">
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Product
                        Name</label>
                    <input type="text" id="editProductName" class="form-control" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Unit of
                        Measure</label>
                    <select id="editUomSelect" class="form-control" required>
                        <!-- Filled by JS -->
                    </select>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Price Per
                        Unit</label>
                    <input type="number" step="0.01" id="editProductPrice" class="form-control" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('productModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add UOM Modal -->
    <div id="uomModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Add Unit of Measure</h2>
            <form id="uomForm">
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">UOM Name</label>
                    <input type="text" id="uomName" class="form-control" required placeholder="e.g. Box, Cubic Meter">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('uomModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save UOM</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/custom.js?v=3"></script>
    <script>
        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            loadUOMs();

            // Handle Inline Add
            document.getElementById('productForm').onsubmit = handleProductSubmit;

            // Handle Modal Edit
            document.getElementById('editProductForm').onsubmit = handleEditProductSubmit;

            document.getElementById('uomForm').onsubmit = handleUOMSubmit;
        });
    </script>
    <script>
    function filterProducts() {
        const searchText = document.getElementById('searchBar').value.toLowerCase();
        const rows = document.querySelectorAll('#products-table-body tr');
        rows.forEach(row => {
            const name = row.cells[0]?.textContent.toLowerCase() || '';
            row.style.display = name.includes(searchText) ? '' : 'none';
        });
    }
</script>
</body>

</html>
