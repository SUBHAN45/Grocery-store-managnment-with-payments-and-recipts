<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Store Management</title>
    <link rel="stylesheet" href="/static/css/custom.css">
</head>

<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">GroceryManager</a>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/manage-products" class="nav-link">Products</a>
            <a href="/orders" class="nav-link">New Order</a>
            <a href="/inventory" class="nav-link">Inventory</a>
        </div>
    </nav>

    <div class="container" style="text-align: center; padding-top: 5rem;">
        <h1
            style="font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            Welcome to GroceryManager
        </h1>
        <p
            style="color: #fff; font-size: 1.25rem; font-weight: 500; margin-bottom: 3rem; max-width: 600px; margin-left: auto; margin-right: auto; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);">
            The modern solution for managing your grocery store efficiently. Track inventory, process orders, and
            analyze sales.
        </p>

        <div style="display: flex; justify-content: center; gap: 2rem;">
            <a href="/orders" class="btn btn-primary" style="font-size: 1.2rem; padding: 1rem 2rem;">Start Selling</a>
            <a href="/manage-products" class="btn btn-secondary" style="font-size: 1.2rem; padding: 1rem 2rem;">Manage Products</a>
            <a href="/inventory" class="btn btn-secondary" style="font-size: 1.2rem; padding: 1rem 2rem;">View Inventory</a>
        </div>
    </div>
</body>

</html>
