<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GroceryManager</title>
    <link rel="stylesheet" href="/static/css/custom.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">GroceryManager</a>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link active">Dashboard</a>
            <a href="/manage-products" class="nav-link">Products</a>
            <a href="/orders" class="nav-link">New Order</a>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Total Orders</div>
                <div class="stat-value" id="totalOrdersCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Total Revenue</div>
                <div class="stat-value">₹<span id="totalRevenue">0.00</span></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Recent Orders</h2>
                <a href="/orders" class="btn btn-primary btn-sm">+ New Order</a>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Customer Name</th>
                            <th>Total Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div id="orderDetailsModal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 id="orderDetailTitle">Order #</h2>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <button class="btn btn-secondary btn-sm" onclick="printReceipt()" title="Print Receipt">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                        Print
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="downloadPDF()" title="Download PDF">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
                        PDF
                    </button>
                    <button onclick="closeModal('orderDetailsModal')"
                        style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:1.5rem; margin-left: 1rem;">&times;</button>
                </div>
            </div>

            <div class="table-container" style="margin-bottom: 1.5rem;">
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="order-details-body">
                        <!-- Details -->
                    </tbody>
                </table>
            </div>

            <div style="text-align: right; padding-top: 1rem; border-top: 1px solid var(--surface-border);">
                <span style="color: var(--text-secondary); margin-right: 1rem;">Grand Total:</span>
                <span
                    style="font-size: 1.25rem; font-weight: 700; color: var(--secondary);">₹<span id="orderDetailTotal">0.00</span></span>
            </div>
        </div>
    </div>
    
    <!-- Hidden Receipt for Printing/PDF -->
    <div id="receipt-container" style="display: none;">
        <div class="receipt-content" id="receipt-print-area">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="/static/js/custom.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadOrders();
        });
    </script>
</body>

</html>
